name: 东方财富行业资金流向抓取

on:
  schedule:
    # 北京时间 09:30-09:50 (UTC 01:30-01:50)
    - cron: "30,40,50 1 * * 1-5"
    # 北京时间 10:00-14:50 (UTC 02:00-06:50)，每10分钟
    - cron: "*/10 2-6 * * 1-5"
    # 北京时间 15:00-15:30 (UTC 07:00-07:30)
    - cron: "0,10,20,30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅测试，不部署"
        required: false
        default: false
        type: boolean

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch data
        run: python fetch_eastmoney_flow.py -o industry_fund_flow.js

      - name: Deploy to Cloudflare Pages
        if: ${{ !inputs.dry_run }}
        run: |
          npx wrangler pages deploy . \
            --project-name=fund-dashboard \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
